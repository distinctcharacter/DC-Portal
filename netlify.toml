[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["protected-resources/resources/*.pdf"]

[[redirects]]
  from = "/resources/*"
  to = "/.netlify/functions/protected-resource?file=:splat"
  status = 200
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"
